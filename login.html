<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Log In | ClassyDate</title>
    <meta name="description" content="Log in to your ClassyDate account and start connecting with meaningful relationships.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
    <style>
        /* ============================================================
           CLASSYDATE - Login Page
           ============================================================ */

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0D0B1A;
            color: #FAF8F5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ---------- HEADER ---------- */
        .cb-shell-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(13, 11, 26, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 45, 85, 0.08);
        }

        .cb-shell-header__inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cb-shell-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 700;
            color: #FF2D55;
        }
        .cb-shell-brand span {
            color: #FAF8F5;
            font-weight: 300;
        }
        .cb-shell-brand .icon {
            font-size: 32px;
        }

        .cb-shell-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cb-shell-button {
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .cb-shell-button--secondary {
            background: rgba(255, 45, 85, 0.1);
            color: #FF2D55;
            border: 1px solid rgba(255, 45, 85, 0.12);
        }
        .cb-shell-button--secondary:hover {
            background: rgba(255, 45, 85, 0.18);
        }
        .cb-shell-button--primary {
            background: #FF2D55;
            color: #0D0B1A;
        }
        .cb-shell-button--primary:hover {
            background: #FF0040;
            transform: translateY(-2px);
        }

        /* ---------- LOGIN CONTAINER ---------- */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            min-height: 100vh;
            background: radial-gradient(ellipse at center top, rgba(255, 45, 85, 0.06), transparent 70%);
        }

        .login-card {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
        }

        .login-card__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-card__header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .login-card__header h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            color: #FAF8F5;
            font-weight: 400;
        }

        .login-card__header p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-top: 4px;
        }

        /* ---------- FORM ---------- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #FAF8F5;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-group input:focus {
            border-color: #FF2D55;
            background: rgba(255, 45, 85, 0.04);
            box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.08);
        }

        .form-group input:focus-visible {
            outline: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #FF2D55;
            cursor: pointer;
        }

        .form-options a {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .form-options a:hover {
            color: #FF2D55;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF2D55, #FF0040);
            color: #FAF8F5;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 45, 85, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ---------- DIVIDER ---------- */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }

        /* ---------- SOCIAL LOGIN ---------- */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .social-btn .icon {
            font-size: 20px;
        }

        /* ---------- FOOTER LINK ---------- */
        .login-footer {
            text-align: center;
            margin-top: 8px;
        }

        .login-footer p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        .login-footer a {
            color: #FF2D55;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #FF0040;
            text-decoration: underline;
        }

        /* ---------- ERROR MESSAGE ---------- */
        .error-message {
            display: none;
            background: rgba(255, 45, 85, 0.12);
            border: 1px solid rgba(255, 45, 85, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: #FF2D55;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .error-message.show {
            display: block;
        }

        /* ---------- TOAST ---------- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            background: #1A1A2E;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: rgba(0, 200, 81, 0.2);
        }

        .toast.success .toast-icon {
            color: #00C851;
        }

        .toast.error {
            border-color: rgba(255, 45, 85, 0.2);
        }

        .toast.error .toast-icon {
            color: #FF2D55;
        }

        .toast .toast-icon {
            margin-right: 8px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 28px;
            }

            .login-card__header h1 {
                font-size: 24px;
            }

            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- HEADER                                                       -->
    <!-- ============================================================ -->
    <header class="cb-shell-header" role="banner">
        <div class="cb-shell-header__inner">
            <a class="cb-shell-brand" href="/" aria-label="ClassyDate">
                <span class="icon">💎</span>
                Classy<span>Date</span>
            </a>

            <div class="cb-shell-actions">
                <a href="join.html" class="cb-shell-button cb-shell-button--secondary">Join</a>
                <a href="login.html" class="cb-shell-button cb-shell-button--primary">Log in</a>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- LOGIN FORM                                                   -->
    <!-- ============================================================ -->
    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-card__header">
                <span class="icon">💎</span>
                <h1>Welcome Back</h1>
                <p>Log in to continue your journey</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="error-message">
                ⚠️ Invalid email or password. Please try again.
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" checked> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="login-btn">Log In</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-login">
                <button class="social-btn" onclick="alert('Google login coming soon!')">
                    <span class="icon">🔵</span> Google
                </button>
                <button class="social-btn" onclick="alert('Facebook login coming soon!')">
                    <span class="icon">🔷</span> Facebook
                </button>
            </div>

            <div class="login-footer">
                <p>Don't have an account? <a href="join.html">Join free</a></p>
            </div>
        </div>
    </main>

    <!-- ============================================================ -->
    <!-- TOAST                                                       -->
    <!-- ============================================================ -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toast-icon">✅</span>
        <span id="toast-message">Success!</span>
    </div>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                      -->
    <!-- ============================================================ -->
    <!-- Firebase SDK -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // FIREBASE CONFIG - REPLACE WITH YOURS
        // ============================================================
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyCgBJtGQEXc8dOkU4tC-_E9GHAw3Oi4Euk",
            authDomain: "classydate-687f2.firebaseapp.com",
            projectId: "classydate-687f2",
            storageBucket: "classydate-687f2.firebasestorage.app",
            messagingSenderId: "55681226170",
            appId: "1:55681226170:web:61f3c824a8db28a05df983",
            measurementId: "G-B08EF8KDE6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ============================================================
        // DOM REFS
        // ============================================================
        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const errorMessage = document.getElementById('error-message');
        const toast = document.getElementById('toast');

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimeout;

        function showToast(message, type = 'success') {
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');

            toast.className = 'toast ' + type;
            icon.textContent = type === 'success' ? '✅' : '⚠️';
            msg.textContent = message;

            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is already logged in, redirect to admin
                window.location.href = 'admin.html';
            }
        });

        // ============================================================
        // LOGIN HANDLER
        // ============================================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // Validation
            if (!email || !password) {
                errorMessage.textContent = '⚠️ Please fill in all fields.';
                errorMessage.classList.add('show');
                return;
            }

            if (!email.includes('@')) {
                errorMessage.textContent = '⚠️ Please enter a valid email address.';
                errorMessage.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = '⚠️ Password must be at least 6 characters.';
                errorMessage.classList.add('show');
                return;
            }

            // Hide error
            errorMessage.classList.remove('show');

            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Logging in...';

            try {
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ Login successful:', user.email);

                // Show success
                showToast('✅ Welcome back, ' + user.email + '!', 'success');

                // Redirect to admin page
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);

                // Show error message
                let message = '⚠️ Invalid email or password. Please try again.';

                switch (error.code) {
                    case 'auth/user-not-found':
                        message = '⚠️ No account found with this email. Please join first.';
                        break;
                    case 'auth/wrong-password':
                        message = '⚠️ Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        message = '⚠️ Invalid email format. Please check your email.';
                        break;
                    case 'auth/too-many-requests':
                        message = '⚠️ Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/user-disabled':
                        message = '⚠️ This account has been disabled. Please contact support.';
                        break;
                    default:
                        message = '⚠️ ' + error.message;
                }

                errorMessage.textContent = message;
                errorMessage.classList.add('show');

                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
            }
        });

        // ============================================================
        // REMOVE ERROR ON INPUT
        // ============================================================
        emailInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });

        passwordInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });

        console.log('💎 ClassyDate Login Page with Firebase Auth!');
    </script>

</body>
</html>
